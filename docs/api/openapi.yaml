          type: string
          nullable: true
      required: [items]
    AuditEntry:
      type: object
      properties:
        id:
          type: string
        stack_id:
          type: string
          nullable: true
        job_id:
          type: string
          nullable: true
        action:
          type: string
        requested_by:
          type: string
        result:
          type: string
        requested_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        duration_ms:
          type: integer
          nullable: true
      required:
        - id
        - action
        - requested_by
        - result
        - requested_at

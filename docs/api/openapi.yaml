openapi: 3.1.0
info:
  title: Stacklab API
  version: 0.1.0
  summary: Compose-first homelab control panel API
servers:
  - url: /api
security:
  - sessionCookie: []
tags:
  - name: Health
  - name: Auth
  - name: Meta
  - name: Host
  - name: Config
  - name: Git
  - name: Maintenance
  - name: Stacks
  - name: Audit
  - name: Jobs
  - name: Settings
paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service health status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /session:
    get:
      tags: [Auth]
      operationId: getSession
      responses:
        '200':
          description: Current session status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /meta:
    get:
      tags: [Meta]
      operationId: getMeta
      responses:
        '200':
          description: Application metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetaResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /host/overview:
    get:
      tags: [Host]
      operationId: getHostOverview
      responses:
        '200':
          description: Host and Stacklab runtime metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostOverviewResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /host/stacklab-logs:
    get:
      tags: [Host]
      operationId: getStacklabLogs
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
        - in: query
          name: cursor
          required: false
          schema:
            type: string
        - in: query
          name: level
          required: false
          schema:
            type: string
            enum: [debug, info, warn, error]
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Recent Stacklab service logs from journald.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StacklabLogsResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '400':
          $ref: '#/components/responses/ErrorValidationFailed'
  /config/workspace/tree:
    get:
      tags: [Config]
      operationId: getConfigWorkspaceTree
      parameters:
        - in: query
          name: path
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Directory-scoped config workspace listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigTreeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '400':
          description: Invalid path or path is not a directory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /config/workspace/file:
    get:
      tags: [Config]
      operationId: getConfigWorkspaceFile
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Config workspace file metadata and optional content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigFileResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '400':
          description: Invalid path or path is not a file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    put:
      tags: [Config]
      operationId: saveConfigWorkspaceFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigFileSaveRequest'
      responses:
        '200':
          description: Config workspace file saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigFileSaveResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '400':
          description: Invalid path or parent directory shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          description: Binary files are not editable in-browser.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /git/workspace/status:
    get:
      tags: [Git]
      operationId: getGitWorkspaceStatus
      responses:
        '200':
          description: Read-only Git status for the managed Stacklab workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitWorkspaceStatusResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /git/workspace/diff:
    get:
      tags: [Git]
      operationId: getGitWorkspaceDiff
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unified diff for one changed managed file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitDiffResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '400':
          description: Invalid path or path outside managed roots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '503':
          description: Git workspace is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /git/workspace/commit:
    post:
      tags: [Git]
      operationId: commitGitWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitCommitRequest'
      responses:
        '200':
          description: Local commit created for selected managed files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitCommitResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '400':
          description: Invalid commit request or invalid path selection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          description: Commit cannot proceed due to conflicts, permissions, or no staged changes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Git workspace is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /git/workspace/push:
    post:
      tags: [Git]
      operationId: pushGitWorkspace
      responses:
        '200':
          description: Current branch push result for configured upstream.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitPushResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '409':
          description: Upstream is missing or remote rejected the push.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Remote authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Git workspace is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /maintenance/update-stacks:
    post:
      tags: [Maintenance]
      operationId: updateStacks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceUpdateStacksRequest'
      responses:
        '200':
          description: Maintenance update job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          description: One of the selected stacks is locked or invalid for update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      responses:
        '200':
          description: Logout succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /stacks:
    get:
      tags: [Stacks]
      operationId: listStacks
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [name, state, last_action]
      responses:
        '200':
          description: Stack list and summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
    post:
      tags: [Stacks]
      operationId: createStack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStackRequest'
      responses:
        '200':
          description: Stack creation job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '422':
          $ref: '#/components/responses/ErrorValidationFailed'
  /stacks/{stackId}:
    parameters:
      - $ref: '#/components/parameters/StackId'
    get:
      tags: [Stacks]
      operationId: getStack
      responses:
        '200':
          description: Detailed stack view model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackDetailResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    delete:
      tags: [Stacks]
      operationId: deleteStack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteStackRequest'
      responses:
        '200':
          description: Stack deletion job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /stacks/{stackId}/definition:
    parameters:
      - $ref: '#/components/parameters/StackId'
    get:
      tags: [Stacks]
      operationId: getStackDefinition
      responses:
        '200':
          description: Editable stack definition files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StackDefinitionResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorInvalidState'
    put:
      tags: [Stacks]
      operationId: updateStackDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDefinitionRequest'
      responses:
        '200':
          description: Definition save job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorInvalidState'
  /stacks/{stackId}/resolved-config:
    parameters:
      - $ref: '#/components/parameters/StackId'
    get:
      tags: [Stacks]
      operationId: getResolvedConfig
      parameters:
        - in: query
          name: source
          required: false
          schema:
            type: string
            enum: [current, last_valid]
      responses:
        '200':
          description: Resolved config or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedConfigResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
    post:
      tags: [Stacks]
      operationId: previewResolvedConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolvedConfigPreviewRequest'
      responses:
        '200':
          description: Draft resolved config preview or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedConfigResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorInvalidState'
  /stacks/{stackId}/audit:
    parameters:
      - $ref: '#/components/parameters/StackId'
    get:
      tags: [Audit]
      operationId: listStackAudit
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Per-stack audit log.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /stacks/{stackId}/actions/{action}:
    parameters:
      - $ref: '#/components/parameters/StackId'
      - $ref: '#/components/parameters/StackAction'
    post:
      tags: [Stacks]
      operationId: runStackAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyObject'
      responses:
        '200':
          description: Stack action job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          description: Stack locked or invalid state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /audit:
    get:
      tags: [Audit]
      operationId: listAudit
      parameters:
        - in: query
          name: stack_id
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Global audit log.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /settings/password:
    post:
      tags: [Settings]
      operationId: updatePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePasswordResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
  /jobs/{jobId}:
    parameters:
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [Jobs]
      operationId: getJob
      responses:
        '200':
          description: Job snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDetailResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
  /jobs/{jobId}/cancel:
    parameters:
      - $ref: '#/components/parameters/JobId'
    post:
      tags: [Jobs]
      operationId: cancelJob
      responses:
        '200':
          description: Job cancellation requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobEnvelopeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '409':
          $ref: '#/components/responses/ErrorInvalidState'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: stacklab_session
  parameters:
    StackId:
      in: path
      name: stackId
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    Cursor:
      in: query
      name: cursor
      required: false
      schema:
        type: string
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    StackAction:
      in: path
      name: action
      required: true
      schema:
        type: string
        enum: [validate, up, down, stop, restart, pull, build, recreate]
  responses:
    ErrorUnauthorized:
      description: Authentication required or invalid session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorConflict:
      description: Request conflicts with current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorInvalidState:
      description: Operation not allowed in current state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorValidationFailed:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    EmptyObject:
      type: object
      additionalProperties: false
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          const: ok
        version:
          type: string
      required: [status, version]
    SessionResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/SessionUser'
        features:
          $ref: '#/components/schemas/FeatureFlags'
      required: [authenticated, features]
    SessionUser:
      type: object
      properties:
        id:
          type: string
        display_name:
          type: string
      required: [id, display_name]
    FeatureFlags:
      type: object
      properties:
        host_shell:
          type: boolean
      required: [host_shell]
    MetaResponse:
      type: object
      properties:
        app:
          type: object
          properties:
            name:
              type: string
            version:
              type: string
          required: [name, version]
        environment:
          type: object
          properties:
            stack_root:
              type: string
            platform:
              type: string
          required: [stack_root, platform]
        docker:
          type: object
          properties:
            engine_version:
              type: string
            compose_version:
              type: string
          required: [engine_version, compose_version]
        features:
          $ref: '#/components/schemas/FeatureFlags'
      required: [app, environment, docker, features]
    HostOverviewResponse:
      type: object
      properties:
        host:
          $ref: '#/components/schemas/HostMeta'
        stacklab:
          $ref: '#/components/schemas/StacklabMeta'
        docker:
          $ref: '#/components/schemas/DockerMeta'
        resources:
          $ref: '#/components/schemas/HostResources'
      required: [host, stacklab, docker, resources]
    HostMeta:
      type: object
      properties:
        hostname:
          type: string
        os_name:
          type: string
        kernel_version:
          type: string
        architecture:
          type: string
        uptime_seconds:
          type: integer
      required: [hostname, os_name, kernel_version, architecture, uptime_seconds]
    StacklabMeta:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        started_at:
          type: string
          format: date-time
      required: [version, commit, started_at]
    DockerMeta:
      type: object
      properties:
        engine_version:
          type: string
        compose_version:
          type: string
      required: [engine_version, compose_version]
    HostResources:
      type: object
      properties:
        cpu:
          $ref: '#/components/schemas/HostCPU'
        memory:
          $ref: '#/components/schemas/HostMemory'
        disk:
          $ref: '#/components/schemas/HostDisk'
      required: [cpu, memory, disk]
    HostCPU:
      type: object
      properties:
        core_count:
          type: integer
        load_average:
          type: array
          items:
            type: number
            format: double
        usage_percent:
          type: number
          format: double
      required: [core_count, load_average, usage_percent]
    HostMemory:
      type: object
      properties:
        total_bytes:
          type: integer
        used_bytes:
          type: integer
        available_bytes:
          type: integer
        usage_percent:
          type: number
          format: double
      required: [total_bytes, used_bytes, available_bytes, usage_percent]
    HostDisk:
      type: object
      properties:
        path:
          type: string
        total_bytes:
          type: integer
        used_bytes:
          type: integer
        available_bytes:
          type: integer
        usage_percent:
          type: number
          format: double
      required: [path, total_bytes, used_bytes, available_bytes, usage_percent]
    StacklabLogsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StacklabLogEntry'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required: [items, has_more]
    StacklabLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [debug, info, warn, error]
        message:
          type: string
        cursor:
          type: string
      required: [timestamp, level, message, cursor]
    ConfigEntryType:
      type: string
      enum: [directory, text_file, binary_file, unknown_file]
    ConfigTreeResponse:
      type: object
      properties:
        workspace_root:
          type: string
        current_path:
          type: string
        parent_path:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConfigTreeEntry'
      required: [workspace_root, current_path, items]
    ConfigTreeEntry:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        type:
          $ref: '#/components/schemas/ConfigEntryType'
        size_bytes:
          type: integer
        modified_at:
          type: string
          format: date-time
        stack_id:
          type: string
          nullable: true
      required: [name, path, type, size_bytes, modified_at]
    ConfigFileResponse:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/ConfigEntryType'
        stack_id:
          type: string
          nullable: true
        content:
          type: string
          nullable: true
        encoding:
          type: string
          nullable: true
        size_bytes:
          type: integer
        modified_at:
          type: string
          format: date-time
        writable:
          type: boolean
      required: [path, name, type, size_bytes, modified_at, writable]
    ConfigFileSaveRequest:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
        create_parent_directories:
          type: boolean
      required: [path, content, create_parent_directories]
    ConfigFileSaveResponse:
      type: object
      properties:
        saved:
          type: boolean
        path:
          type: string
        modified_at:
          type: string

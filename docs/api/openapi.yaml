      type: object
      properties:
        password:
          type: string
      required: [password]
    LoginResponse:
      type: object
      properties:
        authenticated:
          type: boolean
          const: true
      required: [authenticated]
    LogoutResponse:
      type: object
      properties:
        authenticated:
          type: boolean
          const: false
      required: [authenticated]
    CreateStackRequest:
      type: object
      properties:
        stack_id:
          type: string
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        compose_yaml:
          type: string
        env:
          type: string
        create_config_dir:
          type: boolean
        create_data_dir:
          type: boolean
        deploy_after_create:
          type: boolean
      required:
        - stack_id
        - compose_yaml
        - env
        - create_config_dir
        - create_data_dir
        - deploy_after_create
    UpdateDefinitionRequest:
      type: object
      properties:
        compose_yaml:
          type: string
        env:
          type: string
        validate_after_save:
          type: boolean
      required: [compose_yaml, env, validate_after_save]
    DeleteStackRequest:
      type: object
      properties:
        remove_runtime:
          type: boolean
        remove_definition:
          type: boolean
        remove_config:
          type: boolean
        remove_data:
          type: boolean
      required:
        - remove_runtime
        - remove_definition
        - remove_config
        - remove_data
    UpdatePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
      required: [current_password, new_password]
    UpdatePasswordResponse:
      type: object
      properties:
        updated:
          type: boolean
      required: [updated]
    JobEnvelopeResponse:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/Job'
      required: [job]
    JobDetailResponse:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/Job'
      required: [job]
    Job:
      type: object
      properties:
        id:
          type: string
        stack_id:
          type: string
          nullable: true
        action:
          type: string
        state:
          $ref: '#/components/schemas/JobState'
        requested_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        workflow:
          type: object
          properties:
            steps:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: string
                  state:
                    $ref: '#/components/schemas/JobState'
                  target_stack_id:
                    type: string
                required: [action, state]
          required: [steps]
          nullable: true
      required:
        - id
        - stack_id
        - action
        - state
    MaintenanceUpdateStacksRequest:
      type: object
      properties:
        target:
          type: object
          properties:
            mode:
              type: string
              enum: [selected, all]
            stack_ids:
              type: array
              items:
                type: string
          required: [mode]
        options:
          type: object
          properties:
            pull_images:
              type: boolean
              default: true
            build_images:
              type: boolean
              default: true
            remove_orphans:
              type: boolean
              default: true
            prune_after:
              type: object
              properties:
                enabled:
                  type: boolean
                  default: false
                include_volumes:
                  type: boolean
                  default: false
      required: [target]
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required: [error]
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: object
            - type: 'null'
      required: [code, message]
    RuntimeState:
      type: string
      enum: [defined, running, partial, stopped, error, orphaned]
    DisplayState:
      type: string
      enum: [defined, running, partial, stopped, error, orphaned]
    ConfigState:
      type: string
      enum: [unknown, in_sync, drifted, invalid]
    ActivityState:
      type: string
      enum: [idle, locked]
    ServiceMode:
      type: string
      enum: [image, build, hybrid]
    ContainerStatus:
      type: string
      enum: [created, running, restarting, paused, exited, dead]
    JobState:
      type: string
      enum: [queued, running, succeeded, failed, cancel_requested, cancelled, timed_out]
    JobStateTerminal:
      type: string
      enum: [succeeded, failed, cancelled, timed_out]

            type: string
        branch:
          type: string
        head_commit:
          type: string
        has_upstream:
          type: boolean
        upstream_name:
          type: string
        ahead_count:
          type: integer
        behind_count:
          type: integer
        clean:
          type: boolean
        reason:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/GitStatusItem'
      required: [available, repo_root, managed_roots]
    GitStatusItem:
      type: object
      properties:
        path:
          type: string
        scope:
          $ref: '#/components/schemas/GitScope'
        stack_id:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/GitFileStatus'
        old_path:
          type: string
          nullable: true
      required: [path, scope, status]
    GitDiffResponse:
      type: object
      properties:
        available:
          type: boolean
        path:
          type: string
        scope:
          $ref: '#/components/schemas/GitScope'
        stack_id:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/GitFileStatus'
        old_path:
          type: string
          nullable: true
        is_binary:
          type: boolean
        diff:
          type: string
          nullable: true
        truncated:
          type: boolean
      required: [available, path, scope, status, is_binary, truncated]
    GitCommitRequest:
      type: object
      properties:
        message:
          type: string
        paths:
          type: array
          items:
            type: string
      required: [message, paths]
    GitCommitResponse:
      type: object
      properties:
        committed:
          type: boolean
        commit:
          type: string
        summary:
          type: string
        paths:
          type: array
          items:
            type: string
        remaining_changes:
          type: integer
      required: [committed, commit, summary, paths, remaining_changes]
    GitPushResponse:
      type: object
      properties:
        pushed:
          type: boolean
        remote:
          type: string
        branch:
          type: string
        upstream_name:
          type: string
        head_commit:
          type: string
        ahead_count:
          type: integer
        behind_count:
          type: integer
      required: [pushed, remote, branch, upstream_name, head_commit, ahead_count, behind_count]
    StackListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StackListItem'
        summary:
          $ref: '#/components/schemas/StackListSummary'
      required: [items, summary]
    StackListItem:
      allOf:
        - $ref: '#/components/schemas/StackHeader'
        - type: object
          properties:
            service_count:
              type: object
              properties:
                defined:
                  type: integer
                running:
                  type: integer
              required: [defined, running]
            last_action:
              $ref: '#/components/schemas/LastAction'
          required: [service_count]
    StackListSummary:
      type: object
      properties:
        stack_count:
          type: integer
        running_count:
          type: integer
        stopped_count:
          type: integer
        error_count:
          type: integer
        defined_count:
          type: integer
        orphaned_count:
          type: integer
        container_count:
          type: object
          properties:
            running:
              type: integer
            total:
              type: integer
          required: [running, total]
      required:
        - stack_count
        - running_count
        - stopped_count
        - error_count
        - defined_count
        - orphaned_count
        - container_count
    StackDetailResponse:
      type: object
      properties:
        stack:
          $ref: '#/components/schemas/StackDetail'
      required: [stack]
    StackDetail:
      allOf:
        - $ref: '#/components/schemas/StackHeader'
        - type: object
          properties:
            root_path:
              type: string
            compose_file_path:
              type: string
            env_file_path:
              type: string
            config_path:
              type: string
            data_path:
              type: string
            capabilities:
              $ref: '#/components/schemas/StackCapabilities'
            available_actions:
              type: array
              items:
                type: string
            services:
              type: array
              items:
                $ref: '#/components/schemas/Service'
            containers:
              type: array
              items:
                $ref: '#/components/schemas/Container'
            last_deployed_at:
              type: string
              format: date-time
              nullable: true
            last_action:
              $ref: '#/components/schemas/LastAction'
          required:
            - root_path
            - compose_file_path
            - config_path
            - data_path
            - capabilities
            - available_actions
            - services
            - containers
    StackHeader:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        display_state:
          $ref: '#/components/schemas/DisplayState'
        runtime_state:
          $ref: '#/components/schemas/RuntimeState'
        config_state:
          $ref: '#/components/schemas/ConfigState'
        activity_state:
          $ref: '#/components/schemas/ActivityState'
        health_summary:
          $ref: '#/components/schemas/HealthSummary'
      required:
        - id
        - name
        - created_at
        - updated_at
        - display_state
        - runtime_state
        - config_state
        - activity_state
        - health_summary
    HealthSummary:
      type: object
      properties:
        healthy_container_count:
          type: integer
        unhealthy_container_count:
          type: integer
        unknown_health_container_count:
          type: integer
      required:
        - healthy_container_count
        - unhealthy_container_count
        - unknown_health_container_count
    StackCapabilities:
      type: object
      properties:
        can_edit_definition:
          type: boolean
        can_view_logs:
          type: boolean
        can_view_stats:
          type: boolean
        can_open_terminal:
          type: boolean
      required:
        - can_edit_definition
        - can_view_logs
        - can_view_stats
        - can_open_terminal
    Service:
      type: object
      properties:
        name:
          type: string
        mode:
          $ref: '#/components/schemas/ServiceMode'
        image_ref:
          type: string
          nullable: true
        build_context:
          type: string
          nullable: true
        dockerfile_path:
          type: string
          nullable: true
        ports:
          type: array
          items:
            $ref: '#/components/schemas/PortMapping'
        volumes:
          type: array
          items:
            $ref: '#/components/schemas/VolumeMount'
        depends_on:
          type: array
          items:
            type: string
        healthcheck_present:
          type: boolean
      required:
        - name
        - mode
        - ports
        - volumes
        - depends_on
        - healthcheck_present
    Container:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        service_name:
          type: string
        status:
          $ref: '#/components/schemas/ContainerStatus'
        health_status:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        image_id:
          type: string
        image_ref:
          type: string
        ports:
          type: array
          items:
            $ref: '#/components/schemas/PortMapping'
        networks:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - service_name
        - status
        - image_id
        - image_ref
        - ports
        - networks
    PortMapping:
      type: object
      properties:
        published:
          type: integer
        target:
          type: integer
        protocol:
          type: string
      required: [published, target, protocol]
    VolumeMount:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
      required: [source, target]
    LastAction:
      type: object
      properties:
        action:
          type: string
        result:
          $ref: '#/components/schemas/JobStateTerminal'
        finished_at:
          type: string
          format: date-time
      required: [action, result, finished_at]
      nullable: true
    StackDefinitionResponse:
      type: object
      properties:
        stack_id:
          type: string
        files:
          type: object
          properties:
            compose_yaml:
              type: object
              properties:
                path:
                  type: string
                content:
                  type: string
              required: [path, content]
            env:
              type: object
              properties:
                path:
                  type: string
                content:
                  type: string
                exists:
                  type: boolean
              required: [path, content, exists]
          required: [compose_yaml, env]
        config_state:
          $ref: '#/components/schemas/ConfigState'
      required: [stack_id, files, config_state]
    ResolvedConfigPreviewRequest:
      type: object
      properties:
        compose_yaml:
          type: string
        env:
          type: string
      required: [compose_yaml, env]
    ResolvedConfigResponse:
      oneOf:
        - type: object
          properties:
            stack_id:
              type: string
            valid:
              type: boolean
              const: true
            content:
              type: string
          required: [stack_id, valid, content]
        - type: object
          properties:
            stack_id:
              type: string
            valid:
              type: boolean
              const: false
            error:
              $ref: '#/components/schemas/ErrorDetail'
          required: [stack_id, valid, error]
    AuditListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'

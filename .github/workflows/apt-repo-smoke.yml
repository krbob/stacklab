name: APT Repo Smoke

on:
  workflow_dispatch:
    inputs:
      channel:
        description: APT channel to test
        required: true
        default: stable
        type: choice
        options:
          - stable
          - nightly
      repo_url:
        description: Override repo URL
        required: false
        default: https://krbob.github.io/stacklab/apt
        type: string
      expected_version:
        description: Optional exact stacklab package version to require
        required: false
        type: string

permissions:
  contents: read

jobs:
  apt-repo-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Smoke install from published APT repo
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        shell: bash
        run: |
          args=(
            --channel "${{ inputs.channel }}"
            --repo-url "${{ inputs.repo_url }}"
            --arch amd64
          )
          if [[ -n "${EXPECTED_VERSION}" ]]; then
            args+=(--expected-version "${EXPECTED_VERSION}")
          fi
          scripts/release/smoke-apt-repo-install.sh "${args[@]}"

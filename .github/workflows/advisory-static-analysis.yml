name: Advisory Static Analysis

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: advisory-static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-staticcheck:
    name: backend-staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./cmd/... ./internal/...

  backend-vulncheck:
    name: backend-vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./cmd/... ./internal/...

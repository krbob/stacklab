name: Tarball Install Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/tarball-install-smoke.yml'
      - '.github/workflows/release-build.yml'
      - 'LICENSE'
      - 'NOTICE'
      - 'THIRD_PARTY_NOTICES.md'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/public/font-licenses.txt'
      - 'packaging/systemd/**'
      - 'scripts/release/build-artifact.sh'
      - 'scripts/release/generate-third-party-notices.sh'
      - 'scripts/release/upgrade.sh'
      - 'scripts/release/smoke-tarball-install.sh'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/tarball-install-smoke.yml'
      - '.github/workflows/release-build.yml'
      - 'LICENSE'
      - 'NOTICE'
      - 'THIRD_PARTY_NOTICES.md'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/public/font-licenses.txt'
      - 'packaging/systemd/**'
      - 'scripts/release/build-artifact.sh'
      - 'scripts/release/generate-third-party-notices.sh'
      - 'scripts/release/upgrade.sh'
      - 'scripts/release/smoke-tarball-install.sh'

permissions:
  contents: read

concurrency:
  group: tarball-install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tarball-install-smoke:
    name: tarball-install-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build release artifact
        env:
          STACKLAB_RELEASE_VERSION: 0.0.0-ci
          STACKLAB_RELEASE_GOARCH: amd64
        run: scripts/release/build-artifact.sh

      - name: Smoke install tarball on Debian
        run: scripts/release/smoke-tarball-install.sh dist/release/stacklab-0.0.0-ci-linux-amd64.tar.gz

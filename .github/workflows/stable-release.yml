name: Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional override, for example 2026.05.0
        required: false
        type: string
  schedule:
    - cron: '43 3 1 * *'

permissions:
  contents: read

concurrency:
  group: apt-pages-publication
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare-stable
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.vars.outputs.should_publish }}
      release_version: ${{ steps.vars.outputs.release_version }}
      previous_tag: ${{ steps.vars.outputs.previous_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute stable release vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          release_version="${{ github.event.inputs.version }}"
          if [[ -z "${release_version}" ]]; then
            release_version="$(date -u +%Y.%m.0)"
          fi
          if git rev-parse -q --verify "refs/tags/${release_version}" >/dev/null; then
            {
              echo "should_publish=false"
              echo "release_version=${release_version}"
              echo "previous_tag="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          previous_tag="$(git tag --list '[0-9][0-9][0-9][0-9].[0-9][0-9].*' --sort=-version:refname | head -n1 || true)"
          {
            if [[ -n "${previous_tag}" ]] && [[ "$(git rev-list --count "${previous_tag}..HEAD")" -eq 0 ]]; then
              echo "should_publish=false"
            else
              echo "should_publish=true"
            fi
            echo "release_version=${release_version}"
            echo "previous_tag=${previous_tag}"
          } >> "$GITHUB_OUTPUT"

  quality-gate:
    name: quality-gate-stable
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    uses: ./.github/workflows/release-quality-gate.yml
    with:
      source_sha: ${{ github.sha }}

  build:
    name: build-stable-${{ matrix.arch }}
    needs: [prepare, quality-gate]
    if: needs.prepare.outputs.should_publish == 'true' && needs.quality-gate.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build release artifact
        env:
          STACKLAB_RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          STACKLAB_RELEASE_COMMIT: ${{ github.sha }}
          STACKLAB_RELEASE_GOARCH: ${{ matrix.arch }}
        run: scripts/release/build-artifact.sh

      - name: Build Debian package
        env:
          STACKLAB_RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          STACKLAB_RELEASE_GOARCH: ${{ matrix.arch }}
        run: scripts/release/build-deb.sh

      - name: Upload stable artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stable-${{ matrix.arch }}
          path: |
            dist/release/stacklab-${{ needs.prepare.outputs.release_version }}-linux-${{ matrix.arch }}.tar.gz
            dist/release/stacklab-${{ needs.prepare.outputs.release_version }}-linux-${{ matrix.arch }}.tar.gz.sha256
            dist/release/stacklab_${{ needs.prepare.outputs.release_version }}_${{ matrix.arch }}.deb
            dist/release/stacklab_${{ needs.prepare.outputs.release_version }}_${{ matrix.arch }}.deb.sha256

  smoke-package:
    name: smoke-stable-install-modes
    needs: [prepare, build]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download amd64 stable artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stable-amd64
          path: dist/release

      - name: Smoke install package on Debian
        run: scripts/release/smoke-deb-install.sh dist/release/stacklab_${{ needs.prepare.outputs.release_version }}_amd64.deb

      - name: Smoke install tarball on Debian
        run: scripts/release/smoke-tarball-install.sh dist/release/stacklab-${{ needs.prepare.outputs.release_version }}-linux-amd64.tar.gz

  publish:
    name: publish-stable
    needs: [prepare, quality-gate, build, smoke-package]
    if: needs.prepare.outputs.should_publish == 'true' && needs.quality-gate.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Download stable artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: stable-*
          path: dist/stable
          merge-multiple: true

      - name: Install APT publishing tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Generate release notes
        env:
          PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
        run: |
          set -euo pipefail
          args=(--version "${{ needs.prepare.outputs.release_version }}" --channel stable --repo "https://github.com/${GITHUB_REPOSITORY}")
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            args+=(--from "${PREVIOUS_TAG}")
          fi
          scripts/release/generate-release-notes.sh "${args[@]}" > dist/stable/release-notes.md

      - name: Create stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.release_version }}" \
            dist/stable/* \
            --target "${GITHUB_SHA}" \
            --title "Stacklab ${{ needs.prepare.outputs.release_version }}" \
            --notes-file dist/stable/release-notes.md

      - name: Prepare Pages worktree
        run: scripts/release/prepare-pages-worktree.sh "${RUNNER_TEMP}/gh-pages" gh-pages

      - name: Publish APT stable channel
        env:
          APT_GPG_PRIVATE_KEY_BASE64: ${{ secrets.APT_GPG_PRIVATE_KEY_BASE64 }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: scripts/release/publish-apt-repo.sh --channel stable --pages-dir "${RUNNER_TEMP}/gh-pages" --debs-dir dist/stable

      - name: Commit and push Pages changes
        shell: bash
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/gh-pages"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publish apt stable for ${{ needs.prepare.outputs.release_version }}"
          git push origin HEAD:gh-pages

  smoke-published-apt:
    name: smoke-published-stable-apt
    needs: [prepare, publish]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Wait for Pages to serve stable metadata
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo_url="https://${owner}.github.io/${repo}/apt"
          scripts/release/wait-for-apt-repo-version.sh \
            --channel stable \
            --repo-url "${repo_url}" \
            --arch amd64 \
            --expected-version "${{ needs.prepare.outputs.release_version }}"

      - name: Smoke install from published stable APT repo
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo_url="https://${owner}.github.io/${repo}/apt"
          scripts/release/smoke-apt-repo-install.sh \
            --channel stable \
            --repo-url "${repo_url}" \
            --arch amd64 \
            --expected-version "${{ needs.prepare.outputs.release_version }}"

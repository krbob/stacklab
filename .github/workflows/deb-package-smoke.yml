name: Debian Package Smoke

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact source revision to package and validate
        required: true
        type: string
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/deb-package-smoke.yml'
      - '.github/workflows/release-build.yml'
      - 'LICENSE'
      - 'NOTICE'
      - 'THIRD_PARTY_NOTICES.md'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/public/font-licenses.txt'
      - 'packaging/debian/**'
      - 'scripts/release/build-artifact.sh'
      - 'scripts/release/build-deb.sh'
      - 'scripts/release/generate-third-party-notices.sh'
      - 'scripts/release/run-systemd-deb-smoke.sh'
      - 'scripts/release/smoke-deb-install.sh'
      - 'scripts/release/systemd-smoke.Dockerfile'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deb-package-smoke.yml'
      - '.github/workflows/release-build.yml'
      - 'LICENSE'
      - 'NOTICE'
      - 'THIRD_PARTY_NOTICES.md'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/public/font-licenses.txt'
      - 'packaging/debian/**'
      - 'scripts/release/build-artifact.sh'
      - 'scripts/release/build-deb.sh'
      - 'scripts/release/generate-third-party-notices.sh'
      - 'scripts/release/run-systemd-deb-smoke.sh'
      - 'scripts/release/smoke-deb-install.sh'
      - 'scripts/release/systemd-smoke.Dockerfile'

permissions:
  contents: read

concurrency:
  group: deb-package-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deb-package-smoke:
    name: deb-package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build release artifact
        env:
          STACKLAB_RELEASE_VERSION: 0.0.0-ci
          STACKLAB_RELEASE_GOARCH: amd64
        run: scripts/release/build-artifact.sh

      - name: Build Debian package
        env:
          STACKLAB_RELEASE_VERSION: 0.0.0-ci
          STACKLAB_RELEASE_GOARCH: amd64
        run: scripts/release/build-deb.sh

      - name: Smoke install and upgrade package under systemd
        timeout-minutes: 15
        run: scripts/release/smoke-deb-install.sh dist/release/stacklab_0.0.0-ci_amd64.deb

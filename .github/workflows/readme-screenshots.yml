name: README screenshots

# Regenerate the README gallery from a real, Docker-backed Stacklab instance
# booted inside the runner — the same harness Browser E2E uses. This never
# touches the LAN test VM (unreachable from GitHub-hosted runners); it stands
# the app up from the e2e fixtures so the captures are as reproducible as the
# app allows.
#
# MANUAL ONLY (workflow_dispatch). The dashboard shows inherently live data —
# host uptime/CPU/memory/disk, the streaming log tail, per-stack cpu/mem — so
# no two captures are byte-identical. An automatic (push/cron) trigger would
# therefore open a fresh PR on every run whose diff is dominated by that noise.
# Instead you refresh deliberately, when the UI *design* changes: run this
# workflow, review the visual diff in the PR (or the uploaded artifact), merge.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: capture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        shell: bash
        run: |
          set -euo pipefail
          scripts/e2e/run-backend.sh >"${RUNNER_TEMP}/stacklab-screenshots.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/stacklab-screenshots.pid"

      - name: Wait for backend health
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:18081/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Capture screenshots
        working-directory: frontend
        env:
          STACKLAB_URL: http://127.0.0.1:18081
          STACKLAB_PASSWORD: stacklab-e2e
        run: npm run screenshots:readme

      - name: Stop backend
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "${RUNNER_TEMP}/stacklab-screenshots.pid" ]]; then
            pid="$(cat "${RUNNER_TEMP}/stacklab-screenshots.pid")"
            kill "${pid}" 2>/dev/null || true
            wait "${pid}" 2>/dev/null || true
          fi

      # Always retrievable, even if the PR step is skipped (e.g. the repo does
      # not allow Actions to open PRs): download and commit the PNGs by hand.
      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readme-screenshots
          path: docs/images/readme/*.png
          if-no-files-found: warn

      # Requires Settings → Actions → General → "Allow GitHub Actions to create
      # and approve pull requests". Non-fatal if disabled — use the artifact.
      - name: Open PR with refreshed screenshots
        continue-on-error: true
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Stage the directory so retired screenshots are removed as well as
          # current captures being updated.
          add-paths: docs/images/readme
          branch: chore/readme-screenshots
          delete-branch: true
          title: "chore(docs): refresh README screenshots"
          commit-message: "chore(docs): refresh README screenshots"
          body: |
            Automated refresh of the README gallery from the Docker-backed
            e2e harness. Review the visual diff before merging.

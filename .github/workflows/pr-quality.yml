name: PR Quality

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact source revision to validate
        required: true
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run frontend checks
        run: make check-frontend

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests and coverage gates
        run: make check-backend-coverage COVERAGE_DIR=coverage

      - name: Upload backend coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-coverage-${{ inputs.source_sha || github.sha }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  backend-hygiene:
    name: backend-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend hygiene checks
        run: make check-backend-hygiene

  repository-hygiene:
    name: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install pinned ShellCheck
        env:
          SHELLCHECK_VERSION: v0.11.0
          SHELLCHECK_ARCHIVE_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/shellcheck.tar.xz"
          bin_dir="${RUNNER_TEMP}/repository-hygiene-bin"
          curl --fail --silent --show-error --location \
            --output "${archive}" \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          printf '%s  %s\n' "${SHELLCHECK_ARCHIVE_SHA256}" "${archive}" | sha256sum --check
          tar -xJf "${archive}" -C "${RUNNER_TEMP}"
          mkdir -p "${bin_dir}"
          install -m 0755 \
            "${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}/shellcheck" \
            "${bin_dir}/shellcheck"
          echo "${bin_dir}" >> "${GITHUB_PATH}"

      - name: Run repository hygiene checks
        run: make check-hygiene

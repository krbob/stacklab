name: PR Quality

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact source revision to validate
        required: true
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests
        run: go test ./cmd/... ./internal/...

  backend-hygiene:
    name: backend-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l cmd internal)"
          if [[ -n "${unformatted}" ]]; then
            echo "Unformatted Go files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./cmd/... ./internal/...

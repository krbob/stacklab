name: Docker Integration

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact source revision to validate
        required: true
        type: string
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docker-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-integration:
    name: docker-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Docker runtime
        shell: bash
        run: |
          set -euo pipefail
          docker version
          if docker compose version; then
            exit 0
          fi
          docker-compose version

      - name: Run Docker-backed integration tests
        run: go test -tags=integration ./internal/httpapi -count=1 -v

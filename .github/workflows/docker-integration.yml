name: Docker Integration

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docker-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-integration:
    name: docker-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Docker runtime
        shell: bash
        run: |
          set -euo pipefail
          docker version
          if docker compose version; then
            exit 0
          fi
          docker-compose version

      - name: Run Docker-backed integration tests
        run: go test -tags=integration ./internal/httpapi -count=1 -v

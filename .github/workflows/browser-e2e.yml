name: Browser E2E

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact source revision to validate
        required: true
        type: string
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: browser-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-e2e:
    name: browser-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ inputs.source_sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start E2E backend
        env:
          STACKLAB_E2E_ENABLE_WORKSPACE_REPAIR: "1"
        shell: bash
        run: |
          set -euo pipefail
          scripts/e2e/run-backend.sh >"${RUNNER_TEMP}/stacklab-e2e.log" 2>&1 &
          echo $! > "${RUNNER_TEMP}/stacklab-e2e.pid"

      - name: Wait for backend health
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:18081/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Run browser E2E
        working-directory: frontend
        env:
          STACKLAB_E2E_URL: http://127.0.0.1:18081
          STACKLAB_E2E_PASSWORD: stacklab-e2e
          STACKLAB_E2E_ENABLE_WORKSPACE_REPAIR: "1"
        run: npm run test:e2e

      - name: Stop E2E backend
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "${RUNNER_TEMP}/stacklab-e2e.pid" ]]; then
            pid="$(cat "${RUNNER_TEMP}/stacklab-e2e.pid")"
            kill "${pid}" 2>/dev/null || true
            wait "${pid}" 2>/dev/null || true
          fi

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-e2e-artifacts
          path: |
            frontend/test-results
            frontend/playwright-report
            ${{ runner.temp }}/stacklab-e2e.log
          if-no-files-found: ignore

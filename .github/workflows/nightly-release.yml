name: Nightly Release

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
      timezone: "Europe/Warsaw"

permissions:
  contents: read

concurrency:
  group: apt-pages-publication
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare-nightly
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.vars.outputs.should_publish }}
      nightly_tag: ${{ steps.vars.outputs.nightly_tag }}
      release_version: ${{ steps.vars.outputs.release_version }}
      previous_tag: ${{ steps.vars.outputs.previous_tag }}
      release_title: ${{ steps.vars.outputs.release_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute nightly release vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=7 HEAD)"
          today="$(date -u +%Y%m%d)"
          next_base="$(python3 - <<'PY'
          from datetime import datetime, timezone
          today = datetime.now(timezone.utc)
          year = today.year
          month = today.month + 1
          if month == 13:
              month = 1
              year += 1
          print(f"{year:04d}.{month:02d}.0")
          PY
          )"
          nightly_tag="nightly-${today}-${short_sha}"
          release_version="${next_base}~nightly${today}+r${GITHUB_RUN_NUMBER}.g${short_sha}"
          latest_nightly="$(git for-each-ref --sort=-creatordate --format='%(refname:short)' 'refs/tags/nightly-*' | head -n1 || true)"
          previous_tag="${latest_nightly}"
          should_publish=true
          if [[ -n "${latest_nightly}" ]]; then
            latest_commit="$(git rev-list -n1 "${latest_nightly}")"
            if [[ "${latest_commit}" == "${GITHUB_SHA}" ]]; then
              should_publish=false
            fi
          fi
          {
            echo "should_publish=${should_publish}"
            echo "nightly_tag=${nightly_tag}"
            echo "release_version=${release_version}"
            echo "previous_tag=${previous_tag}"
            echo "release_title=Stacklab nightly ${today} (${short_sha})"
          } >> "$GITHUB_OUTPUT"

  quality-gate:
    name: quality-gate-nightly
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    uses: ./.github/workflows/release-quality-gate.yml
    with:
      source_sha: ${{ github.sha }}

  build:
    name: build-nightly-${{ matrix.arch }}
    needs: [prepare, quality-gate]
    if: needs.prepare.outputs.should_publish == 'true' && needs.quality-gate.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build release artifact
        env:
          STACKLAB_RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          STACKLAB_RELEASE_COMMIT: ${{ github.sha }}
          STACKLAB_RELEASE_GOARCH: ${{ matrix.arch }}
        run: scripts/release/build-artifact.sh

      - name: Build Debian package
        env:
          STACKLAB_RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          STACKLAB_RELEASE_GOARCH: ${{ matrix.arch }}
        run: scripts/release/build-deb.sh

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-${{ matrix.arch }}
          path: |
            dist/release/stacklab-${{ needs.prepare.outputs.release_version }}-linux-${{ matrix.arch }}.tar.gz
            dist/release/stacklab-${{ needs.prepare.outputs.release_version }}-linux-${{ matrix.arch }}.tar.gz.sha256
            dist/release/stacklab_${{ needs.prepare.outputs.release_version }}_${{ matrix.arch }}.deb
            dist/release/stacklab_${{ needs.prepare.outputs.release_version }}_${{ matrix.arch }}.deb.sha256

  smoke-package:
    name: smoke-nightly-install-modes
    needs: [prepare, build]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download amd64 nightly artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nightly-amd64
          path: dist/release

      - name: Smoke install and upgrade package under systemd
        run: scripts/release/smoke-deb-install.sh dist/release/stacklab_${{ needs.prepare.outputs.release_version }}_amd64.deb

      - name: Smoke install tarball on Debian
        run: scripts/release/smoke-tarball-install.sh dist/release/stacklab-${{ needs.prepare.outputs.release_version }}-linux-amd64.tar.gz

  publish:
    name: publish-nightly
    needs: [prepare, quality-gate, build, smoke-package]
    if: needs.prepare.outputs.should_publish == 'true' && needs.quality-gate.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Download nightly artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nightly-*
          path: dist/nightly
          merge-multiple: true

      - name: Install APT publishing tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Generate release notes
        env:
          PREVIOUS_TAG: ${{ needs.prepare.outputs.previous_tag }}
        run: |
          set -euo pipefail
          args=(--version "${{ needs.prepare.outputs.release_version }}" --channel nightly --repo "https://github.com/${GITHUB_REPOSITORY}")
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            args+=(--from "${PREVIOUS_TAG}")
          fi
          scripts/release/generate-release-notes.sh "${args[@]}" > dist/nightly/release-notes.md

      - name: Create nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.nightly_tag }}" \
            dist/nightly/* \
            --target "${GITHUB_SHA}" \
            --title "${{ needs.prepare.outputs.release_title }}" \
            --notes-file dist/nightly/release-notes.md \
            --prerelease

      - name: Prepare Pages worktree
        run: scripts/release/prepare-pages-worktree.sh "${RUNNER_TEMP}/gh-pages" gh-pages

      - name: Publish APT nightly channel
        env:
          APT_GPG_PRIVATE_KEY_BASE64: ${{ secrets.APT_GPG_PRIVATE_KEY_BASE64 }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: scripts/release/publish-apt-repo.sh --channel nightly --pages-dir "${RUNNER_TEMP}/gh-pages" --debs-dir dist/nightly

      - name: Commit and push Pages changes
        shell: bash
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}/gh-pages"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publish apt nightly for ${{ needs.prepare.outputs.nightly_tag }}"
          git push origin HEAD:gh-pages

  smoke-published-apt:
    name: smoke-published-nightly-apt
    needs: [prepare, publish]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Wait for Pages to serve nightly metadata
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo_url="https://${owner}.github.io/${repo}/apt"
          scripts/release/wait-for-apt-repo-version.sh \
            --channel nightly \
            --repo-url "${repo_url}" \
            --arch amd64 \
            --expected-version "${{ needs.prepare.outputs.release_version }}"

      - name: Smoke install from published nightly APT repo
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo_url="https://${owner}.github.io/${repo}/apt"
          scripts/release/smoke-apt-repo-install.sh \
            --channel nightly \
            --repo-url "${repo_url}" \
            --arch amd64 \
            --expected-version "${{ needs.prepare.outputs.release_version }}"

  cleanup-nightly-releases:
    name: cleanup-nightly-releases
    needs: [prepare, smoke-published-apt]
    if: needs.prepare.outputs.should_publish == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Delete old nightly prereleases
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_NIGHTLY_RELEASES: "14"
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t nightly_tags < <(
            gh api --paginate "/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq '.[] | select(.prerelease == true and (.tag_name | startswith("nightly-"))) | .tag_name'
          )
          keep_count="${KEEP_NIGHTLY_RELEASES}"
          if (( ${#nightly_tags[@]} <= keep_count )); then
            exit 0
          fi
          for tag in "${nightly_tags[@]:${keep_count}}"; do
            gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag
          done

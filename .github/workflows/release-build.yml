name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 2026.04.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-build:
    name: release-build-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build release artifact
        env:
          STACKLAB_RELEASE_VERSION: ${{ inputs.version }}
          STACKLAB_RELEASE_COMMIT: ${{ github.sha }}
          STACKLAB_RELEASE_GOARCH: ${{ matrix.arch }}
        run: scripts/release/build-artifact.sh

      - name: Build Debian package
        env:
          STACKLAB_RELEASE_VERSION: ${{ inputs.version }}
          STACKLAB_RELEASE_GOARCH: ${{ matrix.arch }}
        run: scripts/release/build-deb.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stacklab-${{ inputs.version }}-linux-${{ matrix.arch }}
          path: |
            dist/release/stacklab-${{ inputs.version }}-linux-${{ matrix.arch }}.tar.gz
            dist/release/stacklab-${{ inputs.version }}-linux-${{ matrix.arch }}.tar.gz.sha256
            dist/release/stacklab_${{ inputs.version }}_${{ matrix.arch }}.deb
            dist/release/stacklab_${{ inputs.version }}_${{ matrix.arch }}.deb.sha256
